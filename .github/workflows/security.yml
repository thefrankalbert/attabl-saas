name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/default --config p/nextjs --config p/typescript --config p/owasp-top-ten --sarif --output semgrep.sarif .
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      # --ignore-scripts: this job only audits the dependency graph; it does not
      # need native build steps. Newer pnpm (version: latest) hard-errors on
      # unapproved build scripts (ERR_PNPM_IGNORED_BUILDS), which is irrelevant
      # here and was failing the gate. Skipping scripts sidesteps it cleanly.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
      - name: Audit all dependencies (non-blocking)
        run: pnpm audit --audit-level=critical || true

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
