name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/default --config p/nextjs --config p/typescript --config p/owasp-top-ten --sarif --output semgrep.sarif .
      # semgrep scan above is the actual gate (exits non-zero on blocking findings).
      # The previous github/codeql-action/upload-sarif step required GitHub Advanced
      # Security (code scanning), which is not enabled on this repository, so it
      # always failed. Store the SARIF as a downloadable build artifact instead.
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: ignore

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      # --ignore-scripts: this job only audits the dependency graph; it does not
      # need native build steps. Newer pnpm (version: latest) hard-errors on
      # unapproved build scripts (ERR_PNPM_IGNORED_BUILDS), which is irrelevant
      # here and was failing the gate. Skipping scripts sidesteps it cleanly.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
      - name: Audit all dependencies (non-blocking)
        run: pnpm audit --audit-level=critical || true

  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run gitleaks directly via its official image instead of gitleaks-action@v2.
      # The action required a GITLEAKS_LICENSE / extra token permissions and 403'd
      # on pull_request events. This pins the scan to the repo's .gitleaks.toml
      # (which allowlists test-fixture / doc false positives) and fails ONLY on a
      # real leak (--exit-code 1).
      - name: Scan for secrets (gitleaks)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --config /repo/.gitleaks.toml \
            --no-banner --redact --exit-code 1
