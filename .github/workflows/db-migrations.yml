# Database migrations via CI - the professional path, so migrations are NEVER
# applied to production by hand from a laptop against live data.
#
# Flow:
#   - Pull request touching supabase/migrations/**  -> dry-run diff (read-only),
#     posts what WOULD change. No apply.
#   - Push to main                                  -> apply to STAGING.
#   - GitHub Release published (or manual dispatch)  -> apply to PRODUCTION,
#     with a schema backup artifact taken first.
#
# Required repository secrets:
#   STAGING_DB_URL      session-pooler connection string for the staging project
#   PRODUCTION_DB_URL   session-pooler connection string for the production project
#
# Until a separate staging project exists, set STAGING_DB_URL to the prod URL is
# NOT recommended; create a staging project (see docs/DATABASE-MIGRATIONS.md).

name: DB Migrations

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: db-migrations-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Show pending migrations (read-only, no apply)
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: |
          if [ -z "$STAGING_DB_URL" ]; then
            echo "STAGING_DB_URL not configured yet - skipping migration dry-run."
            echo "Create a staging Supabase project + set the repo secret to enable"
            echo "this gate (see docs/DATABASE-MIGRATIONS.md)."
            exit 0
          fi
          supabase migration list --db-url "$STAGING_DB_URL"

  staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply migrations to staging
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}
        run: |
          if [ -z "$STAGING_DB_URL" ]; then
            echo "STAGING_DB_URL not configured yet - skipping staging apply."
            echo "Create a staging Supabase project + set the repo secret to enable"
            echo "this step (see docs/DATABASE-MIGRATIONS.md)."
            exit 0
          fi
          supabase db push --db-url "$STAGING_DB_URL"

  production:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    environment: production # gate with required reviewers in repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Backup production schema first
        run: |
          mkdir -p supabase/backups
          supabase db dump --db-url "${{ secrets.PRODUCTION_DB_URL }}" \
            -f "supabase/backups/prod-schema-${GITHUB_SHA}.sql"
      - name: Upload schema backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-schema-backup-${{ github.sha }}
          path: supabase/backups/prod-schema-${{ github.sha }}.sql
          retention-days: 90
      - name: Apply migrations to production
        run: supabase db push --db-url "${{ secrets.PRODUCTION_DB_URL }}"
