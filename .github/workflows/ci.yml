name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate 0: Critical files — ensure security-critical files exist
      - name: Critical files guard
        run: |
          CRITICAL_FILES=(
            "src/proxy.ts"
            "src/lib/supabase/client.ts"
            "src/lib/supabase/server.ts"
            "src/lib/supabase/admin.ts"
            "src/lib/supabase/middleware.ts"
            "src/lib/rate-limit.ts"
          )
          MISSING=0
          for f in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::CRITICAL FILE MISSING: $f — this file is required for auth, security, and multi-tenant isolation."
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "::error::One or more critical files are missing. This will break authentication and tenant isolation. Restore them before merging."
            exit 1
          fi
          echo "All critical files present."

      # Gate 0.5: Dependency vulnerability audit (non-blocking warning for now,
      # upgrade to --fail-on-high once all known CVEs are triaged)
      - name: Security audit
        run: pnpm audit --prod || echo "::warning::npm audit found vulnerabilities — review before release"

      # Gate 1: TypeScript type checking
      - name: Typecheck
        run: pnpm typecheck

      # Gate 2: ESLint
      - name: Lint
        run: pnpm lint

      # Gate 3: Prettier formatting
      - name: Format check
        run: pnpm format:check

      # Gate 4: Rule 09 (Square design system) compliance
      # Fails if any forbidden legacy color, radius class or font weight is
      # reintroduced in src/ (shadcn/ui primitives are exempt).
      # See .claude/rules/09-square-design.md for the full rule.
      - name: Rule 09 (Square design) check
        run: pnpm rule09:check

      # Gate 5: Unit tests (Vitest — services + Zod schemas)
      - name: Test
        run: pnpm test

      # Gate 6: Next.js build
      - name: Build
        run: pnpm build
        env:
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Stripe
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL }}
          NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL_YEARLY }}
          NEXT_PUBLIC_STRIPE_PRICE_PREMIUM: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_PREMIUM }}
          NEXT_PUBLIC_STRIPE_PRICE_PREMIUM_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_PREMIUM_YEARLY }}
          # App
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
          # Sentry
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Upstash Redis (rate limiting)
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
