name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate 0: Critical files — ensure security-critical files exist
      - name: Critical files guard
        run: |
          CRITICAL_FILES=(
            "src/proxy.ts"
            "src/lib/supabase/client.ts"
            "src/lib/supabase/server.ts"
            "src/lib/supabase/admin.ts"
            "src/lib/supabase/middleware.ts"
            "src/lib/rate-limit.ts"
          )
          MISSING=0
          for f in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::CRITICAL FILE MISSING: $f — this file is required for auth, security, and multi-tenant isolation."
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "::error::One or more critical files are missing. This will break authentication and tenant isolation. Restore them before merging."
            exit 1
          fi
          echo "All critical files present."

      # Gate 0.5: Dependency vulnerability audit (non-blocking warning for now,
      # upgrade to --fail-on-high once all known CVEs are triaged)
      - name: Security audit
        run: pnpm audit --prod || echo "::warning::npm audit found vulnerabilities — review before release"

      # Gate 1: TypeScript type checking
      - name: Typecheck
        run: pnpm typecheck

      # Gate 2: ESLint
      - name: Lint
        run: pnpm lint

      # Gate 3: Prettier formatting
      - name: Format check
        run: pnpm format:check

      # Gate 4: Unit tests + coverage gate (Vitest - services + Zod schemas)
      # Runs coverage so the ratchet thresholds in vitest.config.ts actually gate PRs.
      # Previously this ran `pnpm test`, leaving the thresholds decorative.
      - name: Test (with coverage gate)
        run: pnpm test:coverage

      # Gate 5: Next.js build
      - name: Build
        run: pnpm build
        env:
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Stripe
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL }}
          NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ESSENTIEL_YEARLY }}
          NEXT_PUBLIC_STRIPE_PRICE_PREMIUM: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_PREMIUM }}
          NEXT_PUBLIC_STRIPE_PRICE_PREMIUM_YEARLY: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_PREMIUM_YEARLY }}
          # App
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
          # Sentry
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Upstash Redis (rate limiting)
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

  # E2E smoke tests (Playwright). Scoped to the DB-free marketing/landing specs
  # (home + segments) which render without auth or a seeded database. The
  # DB-backed specs (admin-dashboard, responsive) need a seeded test database
  # and auth bypass; enabling them in CI is blocked on schema versioning
  # (a versioned baseline so a test DB can be provisioned) and is tracked
  # separately. The playwright config boots `pnpm dev` via its webServer block.
  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: pnpm test:e2e:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_DOMAIN: ${{ secrets.NEXT_PUBLIC_APP_DOMAIN }}
